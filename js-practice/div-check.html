<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let no = prompt("enter a number")
        if (no % 5 == 0 && no % 3 == 0){
            console.log("the nnumber divisible by 3 and 5")
        }
        else if (no % 5 == 0 && no % 3 != 0){
            console.log("divisible by 5 but not in 3")
        }
        else if (no % 5 != 0 && no % 3 == 0){
            console.log("divisible by 3 but not in 5")
        }
        else{
            console.log("not divisible by both")
        }
        </Script>
</body>
</html>
