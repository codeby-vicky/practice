<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Shopping Web Portal</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>
<body>
    <header>
        
        <a href="#"> SHOPSY</a>

        <div id="search-bar">
                <i class="fa-solid fa-magnifying-glass-minus"></i>
                <input type="text" placeholder="Search for Products and Dresses">
        </div>

        <div id="user-icon">
            <a href="#">
                <i class="fa-regular fa-circle-user"></i>
                <h2> Login </h2>
            </a>
        </div>

        <div id="cart">
            <a href="#">
                <i class="fa-solid fa-cart-shopping"></i>
                <h2> Cart </h2>
            </a>
        </div>

        <div id = "seller">
            <a href="#">
                <i class="fa-solid fa-shop"></i>
                <h2> Become a Seller </h2>
            </a>
        </div>

        <div id="more">
            <a href="#">
                 . . .
           </a>
        </div>

    </header>

    <div id = "product-select">

        <div id = "women-dresses"></div>
        <div id = "men-dresses"></div>
        <div id = "kids-dresses"></div>
        <div id = "footwear"></div>
        <div id = "beauty-products"></div>
        <div id = "accessories"></div>
        <div id = "home-decor"></div>
        <div id = "home-furnish"></div>
        <div id = "kitchen-appliances"></div>
        <div id = "sports-fitness"></div>
        <div id = "toys-stationery"></div>
        <div id = "electronics-accessories"></div>


    </div> 
    
</body>
</html>
